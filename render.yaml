services:
  - type: web
    name: portfolio-momen
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free # or your preferred plan
    region: frankfurt # choose your region
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL # Matches config/database.php env('DB_URL')
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: LOG_CHANNEL
        value: errorlog
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync

databases:
  - name: portfolio-db
    plan: free # or your preferred plan
    region: frankfurt
    databaseName: portfolio
    user: momen
