services:
  - type: web
    name: portfolio-momen
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: frankfurt
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_NAME
        value: Portfolio
      - key: APP_URL
        value: https://momen-portfolio.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        value: mumenrami1411@gmail.com
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: "mumenrami1411@gmail.com"
      - key: MAIL_FROM_NAME
        value: "Momen Portfolio"
      - key: APP_KEY
        value: "placeholder_key"
      - key: MAIL_PASSWORD
        value: "placeholder_password"

databases:
  - name: portfolio-db
    plan: free
    region: frankfurt
